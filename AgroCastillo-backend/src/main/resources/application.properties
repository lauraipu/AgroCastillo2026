server.port=8443
server.servlet.context-path=/api

# 🗄️ CONFIGURACIÓN DE BASE DE DATOS (Adaptada para Docker)
# En Docker, localhost debe ser reemplazado por el nombre del servicio de la BD (ej. db o postgres)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/AgroCastillo
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:admin123}
spring.datasource.driver-class-name=org.postgresql.Driver

# 🔒 CONFIGURACIÓN DE CIFRADO SSL (HTTPS)
server.ssl.enabled=true
server.ssl.key-store=classpath:agrocastillo.p12
server.ssl.key-store-password=agrocastillo123
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=agrocastillo

# 🛠️ CONFIGURACIÓN DE JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Eliminamos la línea obsoleta del Dialect que causaba un Warning en tus logs de Docker

# 🔑 CONFIGURACIÓN JWT
jwt.secret=${JWT_SECRET:agrocastillo-clave-secreta-muy-segura-minimo32chars}
jwt.expiration=86400000

# 🌐 GOOGLE OAUTH2 (¡PROTEGIDO CON VARIABLES DE ENTORNO!)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=email

# 🌍 URL DEL FRONTEND
# Ojo: Tu frontend de Angular está corriendo en http://localhost:4200 (sin la 's') en Docker, 
# la propiedad debe reflejar exactamente desde dónde viene la petición.
app.frontend-url=${FRONTEND_URL:http://localhost:4200}

# 📝 SPRINGDOC / SWAGGER
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# 🩺 MONITOREO / HEALTH CHECK
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never