# ═══════════════════════════════════════════════════════════════════════════════
# 📝 APPLICATION-DEV.PROPERTIES - Configuración para Desarrollo Local
# ═══════════════════════════════════════════════════════════════════════════════
#
# IMPORTANTE: Este archivo es SOLO para referencia y desarrollo local
# Para producción, usar variables de entorno (System.getenv())
# Fuente: Auditoría de Seguridad AgroCastillo v1.0 (2026-06-11)
# 
# INSTRUCCIONES:
# 1. En src/main/resources/application.properties usar variables de entorno
# 2. Pasar valores reales en runtime: java -Dspring.profiles.active=dev ...
# 3. O crear archivo application-dev.properties con valores locales
# ═══════════════════════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────────────────────
# SERVIDOR
# ─────────────────────────────────────────────────────────────────────────────
server.port=8443
server.servlet.context-path=/api

# ─────────────────────────────────────────────────────────────────────────────
# ❌ NUNCA USAR EN PRODUCCIÓN - VALORES POR DEFECTO LOCAL SOLAMENTE
# ─────────────────────────────────────────────────────────────────────────────

spring.datasource.url=jdbc:postgresql://localhost:5432/AgroCastillo
spring.datasource.username=postgres
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver

# ─────────────────────────────────────────────────────────────────────────────
# SSL/TLS - SOLO PARA DESARROLLO (self-signed)
# ─────────────────────────────────────────────────────────────────────────────

server.ssl.enabled=true
server.ssl.key-store=classpath:agrocastillo.p12
server.ssl.key-store-password=agrocastillo123
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=agrocastillo

# ─────────────────────────────────────────────────────────────────────────────
# JPA/HIBERNATE - Configuración de BD
# ─────────────────────────────────────────────────────────────────────────────

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─────────────────────────────────────────────────────────────────────────────
# JWT - CAMBIAR EN PRODUCCIÓN
# ─────────────────────────────────────────────────────────────────────────────

jwt.secret=agrocastillo-clave-secreta-muy-segura-minimo32chars
jwt.expiration=86400000

# ─────────────────────────────────────────────────────────────────────────────
# OAUTH2 - CAMBIAR EN PRODUCCIÓN
# ─────────────────────────────────────────────────────────────────────────────

spring.security.oauth2.client.registration.google.client-id=875937736079-0psjhdnjfmobv49vg6jfcmef37ebc3g6.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=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
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=email

# ─────────────────────────────────────────────────────────────────────────────
# FRONTEND URL - CAMBIAR EN PRODUCCIÓN
# ─────────────────────────────────────────────────────────────────────────────

app.frontend-url=https://localhost:4200

# ─────────────────────────────────────────────────────────────────────────────
# SWAGGER/OPENAPI - Documentación de API
# ─────────────────────────────────────────────────────────────────────────────

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ─────────────────────────────────────────────────────────────────────────────
# ACTUATOR - Monitoreo y Health Checks
# ─────────────────────────────────────────────────────────────────────────────

management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=always

# ═══════════════════════════════════════════════════════════════════════════════
# FIN DEL ARCHIVO
# ═══════════════════════════════════════════════════════════════════════════════
